<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background: paper con bordo ink -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#f5f1e8" stroke="#1b1a17" stroke-width="2.5"/>

  <!-- cerchio centrale diviso verticalmente: teal (ottimista) vs viola (scettico) -->
  <defs>
    <clipPath id="circ">
      <circle cx="32" cy="32" r="18"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circ)">
    <rect x="14" y="14" width="18" height="36" fill="#0e8a7a"/>
    <rect x="32" y="14" width="18" height="36" fill="#6c2bd9"/>
  </g>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#1b1a17" stroke-width="2.4"/>

  <!-- linea verticale di separazione (linea nera del masthead) -->
  <line x1="32" y1="14" x2="32" y2="50" stroke="#1b1a17" stroke-width="2"/>

  <!-- accento rosso: "vs" come puntino centrale -->
  <circle cx="32" cy="32" r="3.2" fill="#c1361d" stroke="#1b1a17" stroke-width="1.4"/>
</svg>
